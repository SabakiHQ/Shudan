name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      # Shudan has no test suite. Building the demo bundle is a smoke check that
      # the library source compiles and bundles cleanly -- the demo entry imports
      # ../src/main.js, so webpack pulls in the whole component.
      - name: Build demo
        run: npm run build-demo
