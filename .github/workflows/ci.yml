name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      # Run the render test suite, then build the demo bundle as a smoke check
      # that the library source still compiles and bundles cleanly. The demo
      # entry imports ../src/main.js, so webpack pulls in the whole component.
      - name: Run tests
        run: npm test
      - name: Build demo
        run: npm run build-demo
