name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - name: Run tests
        run: npm test
      # The demo build doubles as a bundle smoke check: the demo entry imports
      # ../src/main.js, so webpack pulling it in confirms the source compiles.
      - name: Build demo
        run: npm run build-demo
