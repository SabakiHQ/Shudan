<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Shudan Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./main.js" type="module"></script>
    <style>
      body {
        display: grid;
        grid: auto / 17em 1fr;
        gap: 2em;
        font-family: sans-serif;
      }

      shudan-goban {
        --shudan-board-background: url("./board.jpg") center
          var(--shudan-board-background-color);
      }

      shudan-goban.smallcoord::part(coord-x) {
        font-size: 0.7em;
      }

      shudan-label-layer.heat::part(label)::first-line {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Shudan Demo</h1>

      <ul>
        <li>
          <label>
            <input type="checkbox" class="interactive" checked /> Interactive
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="coordinates" checked /> Show
            coordinates
          </label>
          <ul>
            <li>
              <label>
                <input type="checkbox" class="alt-coordinates" /> Alternate
                coordinates
              </label>
            </li>
          </ul>
        </li>
        <li>
          <label>
            <input type="checkbox" class="partial" /> Lower right corner only
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="grid" checked /> Show grid
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="stones" checked /> Show stones
          </label>
          <ul>
            <li>
              <label>
                <input type="checkbox" class="custom" /> Custom stones
              </label>
            </li>
            <li>
              <label>
                <input type="checkbox" class="dead" /> Dim dead stones
              </label>
            </li>
          </ul>
        </li>
        <li>
          <label>
            <input type="checkbox" class="markers" /> Show markers and labels
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="ghost-stones" /> Show ghost stones
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="heat" /> Show heat layer
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="hover" /> Show hover stone
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="line" /> Show arrows and lines
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="territory" /> Show territory
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="selection" /> Show selection
          </label>
        </li>
        <li>
          Zoom: <button type="button" class="zoomin">In</button>
          <button type="button" class="zoomout">Out</button>
        </li>
      </ul>
    </div>

    <div>
      <svg style="position: absolute; left: -9999px">
        <defs>
          <symbol id="custom-black-stone" viewBox="0 0 1 1">
            <circle cx="0.5" cy="0.5" r="0.5" fill="black" stroke="none" />
          </symbol>
          <symbol id="custom-white-stone" viewBox="0 0 1 1">
            <circle cx="0.5" cy="0.5" r="0.5" fill="white" stroke="none" />
          </symbol>
        </defs>
      </svg>

      <shudan-goban interactive coords vertex-size="28">
        <shudan-grid-layer class="grid"></shudan-grid-layer>

        <shudan-stone-layer
          class="stones"
          stones='{"D19":-1,"E19":-1,"F19":-1,"G19":1,"J19":1,"K19":1,"L19":-1,"M19":-1,"O19":-1,"Q19":-1,"R19":-1,"S19":1,"C18":-1,"E18":-1,"F18":1,"G18":1,"H18":1,"K18":1,"L18":-1,"N18":-1,"O18":-1,"P18":-1,"Q18":-1,"R18":1,"S18":1,"C17":-1,"D17":-1,"E17":-1,"F17":1,"G17":1,"K17":1,"L17":1,"M17":-1,"N17":-1,"O17":1,"P17":-1,"Q17":1,"S17":1,"E16":-1,"F16":-1,"G16":1,"J16":1,"K16":-1,"L16":1,"M16":1,"N16":1,"O16":1,"P16":1,"R16":1,"E15":-1,"G15":-1,"H15":1,"L15":1,"M15":1,"Q15":1,"R15":1,"S15":1,"C14":-1,"F14":-1,"G14":-1,"H14":1,"K14":-1,"L14":-1,"M14":1,"N14":-1,"O14":-1,"Q14":1,"T14":1,"D13":-1,"E13":-1,"F13":1,"G13":1,"H13":1,"J13":1,"K13":1,"L13":1,"M13":1,"N13":1,"O13":-1,"P13":-1,"Q13":-1,"R13":1,"S13":1,"T13":1,"C12":-1,"D12":1,"E12":1,"G12":1,"H12":-1,"J12":-1,"K12":1,"M12":1,"N12":-1,"P12":1,"Q12":-1,"R12":-1,"S12":-1,"T12":1,"C11":-1,"D11":-1,"E11":1,"F11":1,"G11":1,"J11":-1,"K11":1,"L11":-1,"M11":-1,"O11":-1,"P11":-1,"Q11":1,"R11":1,"S11":1,"T11":1,"C10":-1,"D10":1,"E10":1,"F10":-1,"G10":-1,"H10":-1,"J10":-1,"K10":1,"L10":1,"M10":1,"N10":-1,"O10":-1,"P10":-1,"Q10":-1,"R10":1,"S10":-1,"T10":-1,"A9":-1,"B9":-1,"C9":-1,"D9":-1,"E9":1,"F9":1,"G9":1,"H9":-1,"K9":-1,"L9":1,"M9":-1,"N9":-1,"P9":-1,"Q9":1,"R9":1,"S9":-1,"A8":-1,"B8":1,"C8":-1,"E8":-1,"F8":-1,"G8":-1,"H8":-1,"J8":-1,"K8":-1,"L8":1,"M8":-1,"O8":-1,"P8":-1,"Q8":1,"R8":-1,"T8":-1,"A7":1,"B7":1,"C7":1,"D7":1,"E7":-1,"F7":1,"G7":1,"H7":1,"J7":-1,"K7":1,"M7":1,"N7":-1,"P7":-1,"Q7":1,"R7":-1,"S7":-1,"B6":1,"C6":-1,"D6":1,"E6":1,"F6":-1,"G6":-1,"H6":1,"J6":-1,"K6":1,"L6":1,"M6":1,"N6":-1,"O6":1,"P6":-1,"Q6":1,"R6":1,"S6":-1,"T6":1,"C5":-1,"D5":1,"G5":1,"H5":1,"J5":-1,"K5":-1,"M5":1,"N5":-1,"O5":1,"P5":-1,"Q5":1,"R5":-1,"T5":-1,"C4":1,"E4":1,"G4":1,"H4":1,"J4":1,"K4":-1,"L4":-1,"M4":1,"N4":-1,"O4":-1,"P4":1,"Q4":-1,"R4":-1,"S4":-1,"E3":1,"F3":1,"H3":1,"J3":-1,"L3":-1,"M3":-1,"N3":1,"O3":1,"P3":1,"Q3":1,"R3":-1,"S3":-1,"T3":-1,"C2":1,"D2":1,"E2":-1,"F2":1,"G2":1,"H2":-1,"K2":-1,"L2":-1,"M2":1,"N2":1,"O2":1,"P2":1,"R2":1,"S2":-1,"T2":1,"D1":1,"E1":-1,"F1":-1,"G1":-1,"H1":-1,"J1":-1,"L1":-1,"M1":-1,"N1":1,"O1":1,"Q1":1,"R1":1,"S1":1}'
        >
          <shudan-marker-layer
            class="markers"
            style="display: none"
            markers='{
              "D18": "circle",
              "E18": "circle",
              "F18": "circle",
              "B8": "point",
              "C8": "point",
              "D8": "point",
              "J4": "square",
              "J3": "square",
              "J2": "square",
              "K17": "cross",
              "K16": "cross",
              "K15": "cross",
              "O12": "triangle",
              "P12": "triangle",
              "Q12": "triangle"
            }'
          ></shudan-marker-layer>
          <shudan-label-layer
            class="markers"
            style="display: none"
            labels='{
              "T1": "a",
              "T2": "b",
              "T3": "c",
              "T4": "Long\nlabel with linebreak"
            }'
          ></shudan-label-layer>

          <shudan-ghost-stone-layer
            class="ghost-stones"
            style="display: none"
            stones='{
              "A19": "rgba(0, 0, 0, .6)",
              "A18": "rgba(255, 255, 255, .6)",
              "A17": "rgba(240, 35, 17, .6)",
              "A16": "rgba(146, 39, 143, .6)",
              "A15": "rgba(72, 134, 213, .6)",
              "A14": "rgba(79, 157, 5, .6)",
              "B19": "rgba(0, 0, 0, .3)",
              "B18": "rgba(255, 255, 255, .3)",
              "B17": "rgba(240, 35, 17, .3)",
              "B16": "rgba(146, 39, 143, .3)",
              "B15": "rgba(72, 134, 213, .3)",
              "B14": "rgba(79, 157, 5, .3)"
            }'
          ></shudan-ghost-stone-layer>

          <shudan-heat-layer
            class="heat"
            style="opacity: 0; transition: opacity 0.5s"
            values='{
              "O15": 0.8,
              "P15": 0.9,
              "P14": 0.3,
              "O7": 0.6,
              "B4": 0.1,
              "B3": 0.2,
              "B2": 0.4,
              "A3": 0.4,
              "A2": 0.4
            }'
          ></shudan-heat-layer>
          <shudan-label-layer
            class="heat"
            style="opacity: 0; transition: opacity 0.5s"
            color="white"
            background="none"
            labels='{
              "P15": "90%\n13.5k",
              "B3": "23%\n111",
              "A3": "41%\n2315"
            }'
          ></shudan-label-layer>

          <shudan-hover-stone-layer
            class="hover"
            style="display: none"
          ></shudan-hover-stone-layer>
        </shudan-stone-layer>

        <shudan-line-layer
          class="line"
          style="display: none"
          lines='[["L15", "F12"]]'
        ></shudan-line-layer>
        <shudan-line-layer
          class="line"
          style="display: none"
          lines='[["H8", "N14"], ["Q13", "N4"]]'
          head="arrow"
        ></shudan-line-layer>

        <shudan-paint-layer
          style="opacity: 0; transition: opacity 0.5s"
          class="territory"
          color="rgba(0, 0, 0, .4)"
          painted-vertices='["G19","H19","J19","K19","S19","T19","F18","G18","H18","J18","K18","R18","S18","T18","F17","G17","H17","J17","K17","L17","O17","Q17","R17","S17","T17","G16","H16","J16","K16","L16","M16","N16","O16","P16","Q16","R16","S16","T16","H15","J15","K15","L15","M15","Q15","R15","S15","T15","H14","J14","K14","L14","M14","Q14","R14","S14","T14","F13","G13","H13","J13","K13","L13","M13","N13","R13","S13","T13","D12","E12","F12","G12","K12","M12","T12","E11","F11","G11","K11","Q11","R11","S11","T11","D10","E10","K10","L10","M10","R10","E9","F9","G9","L9","Q9","R9","B8","L8","Q8","A7","B7","C7","D7","F7","G7","H7","K7","L7","M7","Q7","A6","B6","C6","D6","E6","F6","G6","H6","K6","L6","M6","Q6","R6","A5","B5","C5","D5","E5","F5","G5","H5","M5","Q5","A4","B4","C4","D4","E4","F4","G4","H4","J4","M4","P4","A3","B3","C3","D3","E3","F3","G3","H3","N3","O3","P3","Q3","A2","B2","C2","D2","F2","G2","M2","N2","O2","P2","Q2","R2","T2","A1","B1","C1","D1","N1","O1","P1","Q1","R1","S1","T1"]'
        ></shudan-paint-layer>
        <shudan-paint-layer
          style="opacity: 0; transition: opacity 0.5s"
          class="territory"
          color="rgba(255, 255, 255, .4)"
          painted-vertices='["A19","B19","C19","D19","E19","F19","L19","M19","N19","O19","P19","Q19","R19","A18","B18","C18","D18","E18","L18","M18","N18","O18","P18","Q18","A17","B17","C17","D17","E17","M17","N17","P17","A16","B16","C16","D16","E16","F16","A15","B15","C15","D15","E15","F15","G15","A14","B14","C14","D14","E14","F14","G14","N14","O14","A13","B13","C13","D13","E13","O13","P13","Q13","A12","B12","C12","H12","J12","N12","O12","P12","Q12","R12","S12","A11","B11","C11","D11","J11","L11","M11","N11","O11","P11","A10","B10","C10","F10","G10","H10","J10","N10","O10","P10","Q10","S10","T10","A9","B9","C9","D9","H9","J9","K9","M9","N9","O9","P9","S9","T9","A8","C8","E8","F8","G8","H8","J8","K8","M8","N8","O8","P8","R8","S8","T8","E7","J7","N7","O7","P7","R7","S7","T7","J6","N6","O6","P6","S6","T6","J5","K5","N5","O5","P5","R5","S5","T5","K4","L4","N4","O4","Q4","R4","S4","T4","J3","K3","L3","M3","R3","S3","T3","E2","H2","J2","K2","L2","S2","E1","F1","G1","H1","J1","K1","L1","M1"]'
        ></shudan-paint-layer>

        <shudan-paint-layer
          class="selection"
          style="opacity: 0; transition: opacity 0.5s"
          painted-vertices='["J12","K12","J11","L11","J10","K10","L10"]'
          color="rgba(0, 130, 240, .2)"
          stroke="#0082F0"
        ></shudan-paint-layer>

        <shudan-focus-layer class="focus"></shudan-focus-layer>
      </shudan-goban>
    </div>
  </body>
</html>
